applications:
  - name: django-app
    project: default
    namespace: argocd
    source:
      repoURL: https://github.com/SoloOleh/goit-devops-cicd.git
      path: lesson-8-9/charts/django-app
      targetRevision: lesson-8-9
    destination:
      server: https://kubernetes.default.svc
      namespace: default
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

repositories: []
