replicaCount: 1

image:
  repository: 731732766187.dkr.ecr.us-west-2.amazonaws.com/django-app
  tag: build-7
  pullPolicy: Always

command:
  - sh
  - -c

args:
  - python manage.py migrate && python manage.py runserver 0.0.0.0:8000

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

config:
  DJANGO_SECRET_KEY: your-secret-key
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  POSTGRES_HOST: django-db.czy0ouasg3py.us-west-2.rds.amazonaws.com
  POSTGRES_PORT: "5432"
  POSTGRES_DB: appdb
  POSTGRES_USER: goituser
  POSTGRES_PASSWORD: goituserpassword

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 18
  readiness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 3
